<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="760" viewBox="0 0 1800 760" role="img" aria-labelledby="title desc">
  <title id="title">四阶段 AI 开发工作流说明图</title>
  <desc id="desc">任务到手后依次经过阶段0归因、阶段1外部真相、阶段2取值地图、阶段3验证闭环，再宣称完成；收尾后把踩坑回灌到项目档案。</desc>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#e9e3d8" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-18%" y="-24%" width="136%" height="156%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#202737" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="15" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 15 8 L 1 15 z" fill="#596274"/>
    </marker>
    <marker id="arrow-green" markerWidth="17" markerHeight="17" refX="16" refY="8.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1 1 L 16 8.5 L 1 16 z" fill="#16845f"/>
    </marker>
    <style>
      .bg { fill: #f7f5ef; }
      .grid { fill: url(#grid); opacity: .64; }
      .title { font: 800 46px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #1c2332; }
      .subtitle { font: 400 20px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #5f6877; }
      .card { fill: #ffffff; stroke: #ddd6c8; stroke-width: 2; filter: url(#shadow); }
      .loop-card { fill: #f2fbf6; stroke: #a8d8c0; stroke-width: 2; filter: url(#shadow); }
      .kicker { font: 800 15px "SFMono-Regular", Consolas, Menlo, monospace; letter-spacing: 1.4px; }
      .card-title { font: 800 29px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #1c2332; }
      .body-strong { font: 800 22px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #2b3240; }
      .body { font: 500 20px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #4b5362; }
      .loop-title { font: 800 29px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #116b4d; }
      .loop-body { font: 700 23px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #245b48; }
      .note { font: 500 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #756f66; }
      .arrow { stroke: #596274; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: butt; stroke-linejoin: round; }
      .return { stroke: #16845f; stroke-width: 5; fill: none; marker-end: url(#arrow-green); stroke-linecap: butt; stroke-linejoin: round; }
      .guide { stroke: #16845f; stroke-width: 3; fill: none; stroke-dasharray: 10 10; stroke-linecap: round; opacity: .55; }
      .input { fill: #2f6fa7; }
      .stage0 { fill: #b77818; }
      .stage1 { fill: #2469a9; }
      .stage2 { fill: #0d8274; }
      .stage3 { fill: #16845f; }
      .done { fill: #283142; }
      .input-text { fill: #2f6fa7; }
      .stage0-text { fill: #9b5f0e; }
      .stage1-text { fill: #2469a9; }
      .stage2-text { fill: #0d7468; }
      .stage3-text { fill: #16845f; }
      .done-text { fill: #283142; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="760"/>
  <rect class="grid" width="1800" height="760"/>

  <text class="title" x="72" y="78">四阶段 AI 开发工作流</text>
  <text class="subtitle" x="72" y="116">先归因，再核对外部真相；把取值路径钉死，拿到实证后才宣称完成。</text>

  <path class="arrow" d="M 248 305 L 290 305"/>
  <path class="arrow" d="M 535 305 L 577 305"/>
  <path class="arrow" d="M 822 305 L 864 305"/>
  <path class="arrow" d="M 1109 305 L 1151 305"/>
  <path class="arrow" d="M 1396 305 L 1438 305"/>

  <g transform="translate(78 210)">
    <rect class="card" x="0" y="0" width="170" height="190" rx="8"/>
    <rect class="input" x="0" y="0" width="170" height="8" rx="4"/>
    <text class="kicker input-text" x="24" y="40">INPUT</text>
    <text class="card-title" x="85" y="83" text-anchor="middle">任务到手</text>
    <text class="body-strong" x="85" y="124" text-anchor="middle">需求 / Bug</text>
    <text class="body" x="85" y="158" text-anchor="middle">先写清简报</text>
  </g>

  <g transform="translate(290 210)">
    <rect class="card" x="0" y="0" width="245" height="190" rx="8"/>
    <rect class="stage0" x="0" y="0" width="245" height="8" rx="4"/>
    <text class="kicker stage0-text" x="24" y="40">STAGE 0</text>
    <text class="card-title" x="122.5" y="83" text-anchor="middle">归因</text>
    <text class="body-strong" x="122.5" y="124" text-anchor="middle">先定位是哪一层</text>
    <text class="body" x="122.5" y="158" text-anchor="middle">非代码层不写码</text>
  </g>

  <g transform="translate(577 210)">
    <rect class="card" x="0" y="0" width="245" height="190" rx="8"/>
    <rect class="stage1" x="0" y="0" width="245" height="8" rx="4"/>
    <text class="kicker stage1-text" x="24" y="40">STAGE 1</text>
    <text class="card-title" x="122.5" y="83" text-anchor="middle">外部真相</text>
    <text class="body-strong" x="122.5" y="124" text-anchor="middle">先核代码外事实</text>
    <text class="body" x="122.5" y="158" text-anchor="middle">配置 / 数据 / 运维</text>
  </g>

  <g transform="translate(864 210)">
    <rect class="card" x="0" y="0" width="245" height="190" rx="8"/>
    <rect class="stage2" x="0" y="0" width="245" height="8" rx="4"/>
    <text class="kicker stage2-text" x="24" y="40">STAGE 2</text>
    <text class="card-title" x="122.5" y="83" text-anchor="middle">取值地图</text>
    <text class="body-strong" x="122.5" y="124" text-anchor="middle">钉到唯一正路</text>
    <text class="body" x="122.5" y="158" text-anchor="middle">页面 → API → DB</text>
  </g>

  <g transform="translate(1151 210)">
    <rect class="card" x="0" y="0" width="245" height="190" rx="8"/>
    <rect class="stage3" x="0" y="0" width="245" height="8" rx="4"/>
    <text class="kicker stage3-text" x="24" y="40">STAGE 3</text>
    <text class="card-title" x="122.5" y="83" text-anchor="middle">验证闭环</text>
    <text class="body-strong" x="122.5" y="124" text-anchor="middle">跑命令，看证据</text>
    <text class="body" x="122.5" y="158" text-anchor="middle">无实证不收口</text>
  </g>

  <g transform="translate(1438 210)">
    <rect class="card" x="0" y="0" width="245" height="190" rx="8"/>
    <rect class="done" x="0" y="0" width="245" height="8" rx="4"/>
    <text class="kicker done-text" x="24" y="40">DONE</text>
    <text class="card-title" x="122.5" y="83" text-anchor="middle">宣称完成</text>
    <text class="body-strong" x="122.5" y="124" text-anchor="middle">证据齐全后</text>
    <text class="body" x="122.5" y="158" text-anchor="middle">风险也说清</text>
  </g>

  <path class="guide" d="M 1560.5 400 L 1560.5 495"/>
  <path class="return" d="M 1560.5 400 L 1560.5 495"/>

  <g transform="translate(290 495)">
    <rect class="loop-card" x="0" y="0" width="1295" height="128" rx="8"/>
    <text class="loop-title" x="42" y="48">回灌项目档案</text>
    <text class="loop-body" x="42" y="89">踩坑即写回环境真相、取值地图和验证记录；AI 起草，人审合并。</text>
    <text class="note" x="830" y="50">下一次任务从更新后的事实开始。</text>
    <text class="note" x="830" y="86">档案越准，AI 越少猜。</text>
  </g>

  <path class="return" d="M 290 559 L 163 559 L 163 400"/>
  <text class="note" x="1582" y="452">收尾后回灌</text>

  <text class="note" x="72" y="716">阶段纪律：按 0 → 1 → 2 → 3 顺序执行，不跳步；非代码层不写代码，未验证不宣称完成。</text>
</svg>
